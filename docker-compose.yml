services:
  couchdb:
    # 与生产一致：DaoCloud 代理，减轻国内直连 Docker Hub 超时
    image: docker.m.daocloud.io/library/couchdb:3.4
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-adminpass}
    volumes:
      - couchdata:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 可选：与静态站同机时取消注释，并挂载 server/.env
  # api:
  #   build:
  #     context: ./server
  #   env_file: ./server/.env
  #   ports:
  #     - "8787:8787"
  #   depends_on:
  #     couchdb:
  #       condition: service_healthy

volumes:
  couchdata:
