name: Test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: npm test
        run: |
          npm ci
          npm test

      - name: server test
        run: |
          npm ci --prefix server
          npm test --prefix server

      - name: npm audit (advisory)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: build
        env:
          PUBLIC_API_URL: https://card-api.example.test
          PUBLIC_APP_URL: https://card.example.test
          PUBLIC_ADMIN_URL: https://card-admin.example.test
        run: npm run build
