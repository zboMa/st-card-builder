name: 自动打包部署网站
# master分支合并代码自动触发
on:
  push:
    branches: [master]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 清除npm缓存
        run: npm cache clean --force

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install & Build (app + admin packs)
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
          PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
          PUBLIC_ADMIN_URL: ${{ vars.PUBLIC_ADMIN_URL }}
        run: |
          export PUBLIC_API_URL="${PUBLIC_API_URL:-https://card-api.taojiu.love}"
          export PUBLIC_APP_URL="${PUBLIC_APP_URL:-https://card.taojiu.love}"
          export PUBLIC_ADMIN_URL="${PUBLIC_ADMIN_URL:-https://card-admin.taojiu.love}"
          echo "PUBLIC_API_URL=$PUBLIC_API_URL"
          echo "PUBLIC_APP_URL=$PUBLIC_APP_URL"
          echo "PUBLIC_ADMIN_URL=$PUBLIC_ADMIN_URL"
          npm ci
          npm run build
          test -d dist-card
          test -f dist-card/index.html
          test ! -d dist-card/admin
          test -d dist-card-admin
          test -f dist-card-admin/index.html

      - name: Prepare server package (no node_modules / no .env)
        run: |
          mkdir -p /tmp/stcb-server-pack
          rsync -a \
            --exclude node_modules \
            --exclude .env \
            --exclude '.env.*' \
            --exclude tests \
            server/ /tmp/stcb-server-pack/
          test -f /tmp/stcb-server-pack/package.json
          test -f /tmp/stcb-server-pack/src/index.mjs
          chmod +x deploy/ensure-couch.sh

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Upload static packs
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} 'mkdir -p /var/temp-card /var/temp-card-admin'
          rsync -az --delete ./dist-card/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/temp-card/
          rsync -az --delete ./dist-card-admin/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/temp-card-admin/

      - name: Upload server app + deploy assets to /home/st-card-builder
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} 'mkdir -p /home/st-card-builder/server /home/st-card-builder/deploy /home/st-card-builder/couch-data'
          rsync -az --delete \
            --exclude node_modules \
            --exclude .env \
            /tmp/stcb-server-pack/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/home/st-card-builder/server/
          scp deploy/st-card-builder-api.service \
            deploy/st-card-builder-couch.service \
            deploy/docker-compose.couch.yml \
            deploy/ensure-couch.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/home/st-card-builder/deploy/
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} 'chmod +x /home/st-card-builder/deploy/ensure-couch.sh'

      - name: Deploy static sites + CouchDB + API on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            deploy_static() {
              local src="$1"
              local dest="$2"
              mkdir -p "$src" "$dest"
              cp -r "$dest" "${dest}-bak-$(date +%Y%m%d-%H%M)" || true
              rm -rf "${dest:?}"/*
              cp -r "$src"/* "$dest"/
            }

            deploy_static /var/temp-card /var/www/card
            deploy_static /var/temp-card-admin /var/www/card-admin

            # 应用目录固定，不跟 SSH 登录用户 $HOME 走（root 部署时仍用 /home/st-card-builder）
            APP_HOME="/home/st-card-builder"
            SERVER_DIR="$APP_HOME/server"
            DEPLOY_DIR="$APP_HOME/deploy"

            if [[ ! -f "$SERVER_DIR/.env" ]]; then
              echo "[deploy] 缺少 $SERVER_DIR/.env —— 请先在服务器创建生产环境变量（不会被 CI 覆盖）"
              exit 1
            fi

            DEPLOY_USER="$(id -un)"
            DEPLOY_HOME="/home"

            install_unit() {
              local src="$1"
              local name="$2"
              local dst="/etc/systemd/system/${name}"
              sed \
                -e "s|__DEPLOY_USER__|${DEPLOY_USER}|g" \
                -e "s|__DEPLOY_HOME__|${DEPLOY_HOME}|g" \
                "$src" > "/tmp/${name}"
              if [[ "$(id -u)" -eq 0 ]]; then
                cp "/tmp/${name}" "$dst"
              else
                sudo cp "/tmp/${name}" "$dst"
              fi
            }

            sys() {
              if [[ "$(id -u)" -eq 0 ]]; then
                "$@"
              else
                sudo "$@"
              fi
            }

            bash "$DEPLOY_DIR/ensure-couch.sh" "$APP_HOME"

            install_unit "$DEPLOY_DIR/st-card-builder-couch.service" "st-card-builder-couch.service"
            install_unit "$DEPLOY_DIR/st-card-builder-api.service" "st-card-builder-api.service"
            sys systemctl daemon-reload
            sys systemctl enable st-card-builder-couch.service st-card-builder-api.service
            sys systemctl restart st-card-builder-couch.service

            cd "$SERVER_DIR"
            npm ci --omit=dev
            sys systemctl restart st-card-builder-api.service

            sleep 2
            echo "[deploy] API health:"
            curl -sf --max-time 10 "http://127.0.0.1:8787/api/health" | head -c 600
            echo
            echo "[deploy] card + card-admin + couch + api ok"
