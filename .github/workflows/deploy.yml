name: 自动打包部署网站
# master分支合并代码自动触发
on:
  push:
    branches: [master]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 清除npm缓存
        run: npm cache clean --force

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install & Build (frontend)
        run: |
          npm ci
          npm run build
          test -d dist || exit 1

      - name: Prepare server package (no node_modules / no .env)
        run: |
          mkdir -p /tmp/stcb-server-pack
          rsync -a \
            --exclude node_modules \
            --exclude .env \
            --exclude '.env.*' \
            --exclude tests \
            server/ /tmp/stcb-server-pack/
          test -f /tmp/stcb-server-pack/package.json
          test -f /tmp/stcb-server-pack/src/index.mjs
          chmod +x deploy/ensure-couch.sh

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Upload dist (static site)
        run: |
          scp -r ./dist/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/temp-card/

      - name: Upload server app + deploy assets to $HOME
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} 'mkdir -p $HOME/st-card-builder/server $HOME/st-card-builder/deploy $HOME/st-card-builder/couch-data'
          rsync -az --delete \
            --exclude node_modules \
            --exclude .env \
            /tmp/stcb-server-pack/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/st-card-builder/server/
          scp deploy/st-card-builder-api.service \
            deploy/st-card-builder-couch.service \
            deploy/docker-compose.couch.yml \
            deploy/ensure-couch.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/st-card-builder/deploy/
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} 'chmod +x $HOME/st-card-builder/deploy/ensure-couch.sh'

      - name: Deploy static site + CouchDB + API on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            # —— 静态站（保持原路径）——
            WEB_PATH="/var/www/card"
            mkdir -p /var/temp-card "$WEB_PATH"
            cp -r "$WEB_PATH" "/var/www/card-bak-$(date +%Y%m%d-%H%M)" || true
            rm -rf "$WEB_PATH"/*
            cp -r /var/temp-card/* "$WEB_PATH/"

            APP_HOME="$HOME/st-card-builder"
            SERVER_DIR="$APP_HOME/server"
            DEPLOY_DIR="$APP_HOME/deploy"

            if [[ ! -f "$SERVER_DIR/.env" ]]; then
              echo "[deploy] 缺少 $SERVER_DIR/.env —— 请先在服务器创建生产环境变量（不会被 CI 覆盖）"
              exit 1
            fi

            DEPLOY_USER="$(id -un)"
            DEPLOY_HOME="$HOME"

            install_unit() {
              local src="$1"
              local name="$2"
              local dst="/etc/systemd/system/${name}"
              sed \
                -e "s|__DEPLOY_USER__|${DEPLOY_USER}|g" \
                -e "s|__DEPLOY_HOME__|${DEPLOY_HOME}|g" \
                "$src" > "/tmp/${name}"
              if [[ "$(id -u)" -eq 0 ]]; then
                cp "/tmp/${name}" "$dst"
              else
                sudo cp "/tmp/${name}" "$dst"
              fi
            }

            sys() {
              if [[ "$(id -u)" -eq 0 ]]; then
                "$@"
              else
                sudo "$@"
              fi
            }

            # —— CouchDB：探活；不可达则 Docker 拉起；无 Docker 失败 ——
            bash "$DEPLOY_DIR/ensure-couch.sh" "$APP_HOME"

            install_unit "$DEPLOY_DIR/st-card-builder-couch.service" "st-card-builder-couch.service"
            install_unit "$DEPLOY_DIR/st-card-builder-api.service" "st-card-builder-api.service"
            sys systemctl daemon-reload
            sys systemctl enable st-card-builder-couch.service st-card-builder-api.service
            sys systemctl restart st-card-builder-couch.service
            # couch oneshot RemainAfterExit：restart 会再跑 ensure（已健康则秒过）

            # —— API ——
            cd "$SERVER_DIR"
            npm ci --omit=dev
            sys systemctl restart st-card-builder-api.service

            sleep 2
            echo "[deploy] API health:"
            curl -sf --max-time 10 "http://127.0.0.1:8787/api/health" | head -c 600
            echo
            echo "[deploy] static + couch + api ok"
